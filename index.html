<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MizatorLabs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:rgba(15,23,42,0.7);
  --accent:#38bdf8;
  --accent2:#22c55e;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:fixed;
  width:100%;
  backdrop-filter: blur(12px);
  background: rgba(2,6,23,0.5);
}

.logo{
  font-weight:700;
  color:var(--accent);
}

nav a{
  color:var(--text);
  text-decoration:none;
  margin-left:20px;
  transition:0.3s;
}

nav a:hover{
  color:var(--accent);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:52px;
  max-width:700px;
}

.hero span{
  color:var(--accent2);
}

.hero p{
  color:var(--muted);
  margin-top:15px;
  max-width:500px;
}

.hero button{
  margin-top:30px;
  padding:14px 30px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),#16a34a);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.07);
  box-shadow:0 0 25px rgba(34,197,94,0.4);
}

/* PROJECTS */
.projects{
  padding:80px 20px;
  text-align:center;
}

.projects h2{
  font-size:32px;
}

.container{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:40px;
  flex-wrap:wrap;
}

.card{
  background:var(--card);
  padding:30px;
  width:280px;
  border-radius:16px;
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px rgba(56,189,248,0.2);
}

.card h3{
  color:var(--accent);
}

.card p{
  color:var(--muted);
  margin:10px 0;
}

.card button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent2);
  color:white;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

/* FADE ANIM */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.fade.visible{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav>
  <div class="logo">MizatorLabs</div>
  <div>
    <a href="#">Inicio</a>
    <a href="#projects">Proyectos</a>
  </div>
</nav>

<section class="hero fade">
  <h1>Software creado con precisión por <span>Mizator</span></h1>
  <p>Optimización, herramientas y proyectos reales diseñados para rendimiento ⚡</p>
  <button onclick="scrollToProjects()">Explorar</button>
</section>

<section class="projects fade" id="projects">
  <h2>Proyectos</h2>

  <div class="container">

    <div class="card">
      <h3>OptiMizator</h3>
      <p>Optimiza tu PC de forma rápida y segura</p>
      <button onclick="descargar()">Descargar</button>
    </div>

    <div class="card">
      <h3>En desarrollo</h3>
      <p>Próximamente...</p>
      <button disabled>Bloqueado</button>
    </div>

  </div>
</section>

<footer>
  © 2026 MizatorLabs — Built by Mizator
</footer>

<script>
function descargar(){
  window.location.href="https://github.com/TUUSUARIO/TUREPO/releases/download/v1.0/optimizador.exe";
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

/* Animación al hacer scroll */
const elements=document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
  elements.forEach(el=>{
    const pos=el.getBoundingClientRect().top;
    if(pos<window.innerHeight-100){
      el.classList.add('visible');
    }
  });
});
</script>

</body>
</html>
